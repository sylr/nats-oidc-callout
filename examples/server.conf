# Example NATS server configuration for auth callout (non-operator / server
# config mode).
#
# The callout service signs responses with the account seed (SA…) whose public
# key is `issuer`, and decrypts requests with the curve seed (SX…) whose public
# key is `xkey`. The public keys below pair with the DEMO seeds in
# examples/config.yaml — throwaway example keys; generate your own for real use.

listen: 127.0.0.1:4222

# tls {
#   cert_file: "/etc/nats/server.pem"
#   key_file:  "/etc/nats/server-key.pem"
# }

accounts {
  # Account that hosts the callout service user (bypasses the callout).
  AUTH {
    users: [
      { user: "auth", password: "change-me" }
    ]
  }
  # Accounts that authorized clients are placed into. The user JWT's audience is
  # the account NAME (e.g. "APP").
  APP {}
  SYS {}
}

system_account: SYS

authorization {
  auth_callout {
    # Public account nkey (A…) — matches issuer_account_seed in config.yaml.
    issuer: "ABFROHTW52D2EITDLN7KEXKADF5U7PHE2LLWDYY345DHIZFTHYALVQQV"
    # Account whose auth_users run the callout service.
    account: AUTH
    auth_users: ["auth"]
    # Public curve key (X…) — matches xkey_seed in config.yaml. Enables
    # request/response encryption.
    xkey: "XBOC65RS7VQW5XUKSMOI3PX23IJ3Z6K5V7ZBJCFATRSIRF3CIAOBIYB7"
  }
}
