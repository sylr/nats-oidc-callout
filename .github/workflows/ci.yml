---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

# Each job runs inside a per-job Nix dev shell (`nix develop .#ci-<job>`) that
# carries only the tools that job needs, so the toolchain — golangci-lint,
# goreleaser, kind, kubectl, … — is the exact same version locally and in CI
# while keeping each job's /nix/store cache minimal. The Go compiler is selected by
# go.mod's `go` directive (GOTOOLCHAIN), which the pinned go bootstraps.
jobs:
  test:
    runs-on: ubuntu-latest
    # No id-token: write here on purpose — the real-GitHub-OIDC e2e
    # (TestGitHubActionsToken) self-skips without the token endpoint and runs
    # in the dedicated github-oidc-e2e job below instead.
    steps:
    - uses: actions/checkout@v7
    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes
    # Cache /nix/store across runs so the dev shell isn't re-realized from
    # cache.nixos.org every time. Per-job key (github.job) because each job's
    # shell has a different closure; gc caps the store before saving so the
    # GitHub cache entry stays bounded.
    - uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ github.job }}-${{ hashFiles('flake.nix', 'flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-${{ github.job }}-
        gc-max-store-size-linux: 1G

    # Go build/module cache (there is no setup-go to provide one). Probe the
    # paths with GOTOOLCHAIN=local so this step does not fetch the go.mod
    # toolchain before the cache is restored. GOMODCACHE also holds the
    # downloaded toolchain, and go.mod (which pins the go version) keys it.
    - name: Go cache paths
      id: go-cache
      run: |
        out=$(nix develop .#ci-test --command bash -c 'GOTOOLCHAIN=local go env GOCACHE GOMODCACHE')
        {
          echo "gocache=$(printf '%s\n' "$out" | sed -n 1p)"
          echo "gomodcache=$(printf '%s\n' "$out" | sed -n 2p)"
        } >> "$GITHUB_OUTPUT"
    - uses: actions/cache@v4
      with:
        path: |
          ${{ steps.go-cache.outputs.gocache }}
          ${{ steps.go-cache.outputs.gomodcache }}
          ~/.cache/golangci-lint
        key: ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Verify modules are tidy
      run: nix develop .#ci-test --command bash -c 'go mod tidy && git diff --exit-code -- go.mod go.sum'

    - name: Vet
      run: nix develop .#ci-test --command go vet ./...

    - name: golangci-lint
      run: nix develop .#ci-test --command golangci-lint run ./...

    - name: Test (race + hermetic e2e)
      run: nix develop .#ci-test --command go test -race -count=1 ./...

    - name: Build (all tags compile)
      run: nix develop .#ci-test --command bash -c 'go build ./... && go vet -tags e2e_aws ./test/e2e/...'

  github-oidc-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Exposes ACTIONS_ID_TOKEN_REQUEST_URL/TOKEN so TestGitHubActionsToken can
      # mint a real GitHub OIDC token. Fork PRs don't get it → the test skips and
      # this job is green.
      id-token: write
    steps:
    - uses: actions/checkout@v7
    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes
    # Cache /nix/store across runs so the dev shell isn't re-realized from
    # cache.nixos.org every time. Per-job key (github.job) because each job's
    # shell has a different closure; gc caps the store before saving so the
    # GitHub cache entry stays bounded.
    - uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ github.job }}-${{ hashFiles('flake.nix', 'flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-${{ github.job }}-
        gc-max-store-size-linux: 1G

    # Go build/module cache (see the test job for why GOTOOLCHAIN=local).
    - name: Go cache paths
      id: go-cache
      run: |
        out=$(nix develop .#ci-github-oidc-e2e --command bash -c 'GOTOOLCHAIN=local go env GOCACHE GOMODCACHE')
        {
          echo "gocache=$(printf '%s\n' "$out" | sed -n 1p)"
          echo "gomodcache=$(printf '%s\n' "$out" | sed -n 2p)"
        } >> "$GITHUB_OUTPUT"
    - uses: actions/cache@v4
      with:
        # Same path list and key as the test job so the two jobs share one Go
        # cache (golangci-lint dir included only for parity; unused here).
        path: |
          ${{ steps.go-cache.outputs.gocache }}
          ${{ steps.go-cache.outputs.gomodcache }}
          ~/.cache/golangci-lint
        key: ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: GitHub OIDC end-to-end (embedded nats-server + callout + real token)
      run: nix develop .#ci-github-oidc-e2e --command go test -race -count=1 -v -run TestGitHubActionsToken ./test/e2e/...

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes
    # Cache /nix/store across runs so the dev shell isn't re-realized from
    # cache.nixos.org every time. Per-job key (github.job) because each job's
    # shell has a different closure; gc caps the store before saving so the
    # GitHub cache entry stays bounded.
    - uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ github.job }}-${{ hashFiles('flake.nix', 'flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-${{ github.job }}-
        gc-max-store-size-linux: 1G

    - name: goreleaser check
      run: nix develop .#ci-goreleaser-check --command goreleaser check

  k8s-e2e:
    runs-on: ubuntu-latest
    # Uses the Docker daemon preinstalled on the runner; kind and kubectl come
    # from the Nix dev shell. The image is built by the buildx step below (with
    # a layer cache); run.sh then creates a kind cluster, loads that image,
    # deploys NATS + callout, and asserts the projected service-account-token
    # flow (allow nats-client / deny default SA).
    steps:
    - uses: actions/checkout@v7
    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes
    # Cache /nix/store across runs so the dev shell isn't re-realized from
    # cache.nixos.org every time. Per-job key (github.job) because each job's
    # shell has a different closure; gc caps the store before saving so the
    # GitHub cache entry stays bounded.
    - uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ github.job }}-${{ hashFiles('flake.nix', 'flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-${{ github.job }}-
        gc-max-store-size-linux: 1G

    # Build the callout image with buildx and persist the Go module + build
    # caches across runs. The Dockerfile uses BuildKit cache mounts for them;
    # actions/cache stores those dirs and buildkit-cache-dance injects them into
    # / extracts them from the build. This caches the compile (the real cost),
    # which a Docker layer cache cannot once `COPY . .` changes.
    - uses: docker/setup-buildx-action@v4
    - uses: actions/cache@v4
      with:
        path: |
          go-build-cache
          go-mod-cache
        key: ${{ runner.os }}-k8s-image-go-${{ hashFiles('go.sum') }}
        restore-keys: |
          ${{ runner.os }}-k8s-image-go-
    - uses: reproducible-containers/buildkit-cache-dance@v3
      with:
        cache-map: |
          {
            "go-build-cache": "/root/.cache/go-build",
            "go-mod-cache": "/go/pkg/mod"
          }
    - uses: docker/build-push-action@v7
      with:
        context: .
        file: test/k8s/Dockerfile
        tags: nats-jwt-callout:e2e
        load: true
        provenance: false

    - name: Kubernetes service-account-token e2e (kind)
      env:
        SKIP_BUILD: "1"
      run: nix develop .#ci-k8s-e2e --command bash test/k8s/run.sh
