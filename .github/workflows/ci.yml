---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

# All jobs run inside the repo's Nix dev shell (`nix develop .#ci`) so the
# toolchain — golangci-lint, goreleaser, kind, kubectl, … — is the exact same
# version locally and in CI. The Go compiler is selected by go.mod's `go`
# directive (GOTOOLCHAIN), which the pinned go in the shell bootstraps.
jobs:
  test:
    runs-on: ubuntu-latest
    # No id-token: write here on purpose — the real-GitHub-OIDC e2e
    # (TestGitHubActionsToken) self-skips without the token endpoint and runs
    # in the dedicated github-oidc-e2e job below instead.
    steps:
    - uses: actions/checkout@v7
    - uses: DeterminateSystems/nix-installer-action@v22

    - name: Verify modules are tidy
      run: nix develop .#ci --command bash -c 'go mod tidy && git diff --exit-code -- go.mod go.sum'

    - name: Vet
      run: nix develop .#ci --command go vet ./...

    - name: golangci-lint
      run: nix develop .#ci --command golangci-lint run ./...

    - name: Test (race + hermetic e2e)
      run: nix develop .#ci --command go test -race -count=1 ./...

    - name: Build (all tags compile)
      run: nix develop .#ci --command bash -c 'go build ./... && go vet -tags e2e_aws ./test/e2e/...'

  github-oidc-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Exposes ACTIONS_ID_TOKEN_REQUEST_URL/TOKEN so TestGitHubActionsToken can
      # mint a real GitHub OIDC token. Fork PRs don't get it → the test skips and
      # this job is green.
      id-token: write
    steps:
    - uses: actions/checkout@v7
    - uses: DeterminateSystems/nix-installer-action@v22

    - name: GitHub OIDC end-to-end (embedded nats-server + callout + real token)
      run: nix develop .#ci --command go test -race -count=1 -v -run TestGitHubActionsToken ./test/e2e/...

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: DeterminateSystems/nix-installer-action@v22

    - name: goreleaser check
      run: nix develop .#ci --command goreleaser check
